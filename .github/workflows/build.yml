name: Build and Release MediaConverterPro

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PS2EXE
        shell: powershell
        run: Install-Module -Name ps2exe -Force -Scope CurrentUser

      - name: Build EXE
        shell: powershell
        run: |
          Import-Module ps2exe
          ./convert_ps2exe.ps1
          Get-ChildItem

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload EXE to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./MediaConverterPro.exe
          asset_name: MediaConverterPro.exe
          asset_content_type: application/octet-stream

      - name: Upload PS1 to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./MediaConverterPro.ps1
          asset_name: MediaConverterPro.ps1
          asset_content_type: text/plain