name: Build MediaConverterPro EXE

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'MediaConverterPro.exe'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PS2EXE
        shell: pwsh
        run: |
          Install-Module -Name ps2exe -Force -Scope CurrentUser

      - name: Build EXE
        shell: pwsh
        run: |
          Import-Module ps2exe
          ./convert_ps2exe.ps1

          echo "---- FILES AFTER BUILD ----"
          Get-ChildItem

      - name: Commit EXE to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add MediaConverterPro.exe
          git diff --cached --quiet || git commit -m "Auto-build EXE"
          git push